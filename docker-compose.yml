services:
  wireguard:
    build:
      context: ./wireguard
    container_name: wireguard
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      net.ipv4.ip_forward: "1"
      net.ipv4.conf.all.src_valid_mark: "1"
    ports:
      - "${WG_SERVER_PORT:-51820}:${WG_SERVER_PORT:-51820}/udp"
    environment:
      WG_INTERFACE: ${WG_INTERFACE:-wg0}
      WG_SERVER_PORT: ${WG_SERVER_PORT:-51820}
      WG_SERVER_IP: ${WG_SERVER_IP:-10.0.0.1}
      WG_NETWORK: ${WG_NETWORK:-10.0.0.0/22}
      WG_EGRESS_IFACE: ${WG_EGRESS_IFACE:-eth0}
    volumes:
      - wg_keys:/run/wg
      - /lib/modules:/lib/modules:ro
    networks:
      - vpn_net

  bot:
    build:
      context: ./bot
    container_name: vpn_bot
    restart: unless-stopped
    depends_on:
      - wireguard
    env_file:
      - .env
    environment:
      DB_PATH: ${DB_PATH:-/data/vpn.db}
    volumes:
      - sqlite_data:/data
      - wg_keys:/run/wg:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - vpn_net

volumes:
  sqlite_data:
  wg_keys:

networks:
  vpn_net:
    driver: bridge
